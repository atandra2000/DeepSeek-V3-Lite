name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Lint — models/
        run: flake8 models/ --max-line-length=120 --ignore=E501,W503,E203,E221,E241,E226,E231,E272,W391,E402

      - name: Lint — kernels/
        run: flake8 kernels/ --max-line-length=120 --ignore=E501,W503,E203,E221,E241,E226,E231,E272,W391,E402

      - name: Lint — training/
        run: flake8 training/ --max-line-length=120 --ignore=E501,W503,E203,E221,E241,E226,E231,E272,W391,E402

      - name: Lint — inference/
        run: flake8 inference/ --max-line-length=120 --ignore=E501,W503,E203,E221,E241,E226,E231,E272,W391,E402

      - name: Lint — utils/
        run: flake8 utils/ --max-line-length=120 --ignore=E501,W503,E203,E221,E241,E226,E231,E272,W391,E402

      - name: Install CPU-only PyTorch for smoke tests
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers accelerate safetensors

      - name: Smoke test — MoE routing (CPU)
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")

          import torch
          from models.moe import AuxLossFreeGate

          cfg = dict(
              dim=64, n_routed_experts=8,
              n_activated_experts=2,
              n_expert_groups=1, n_limited_groups=1,
          )
          gate = AuxLossFreeGate(cfg)
          x = torch.randn(4, 10, 64)
          weights, idx = gate(x)
          assert weights.shape[-1] == 2, f"gate weights shape {weights.shape}"
          assert idx.shape[-1]     == 2, f"gate idx shape {idx.shape}"
          print("MoE gate smoke test passed.")
          EOF

      - name: Smoke test — MLA forward pass (CPU)
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")

          import torch
          from models.mla import MultiHeadLatentAttention

          cfg = dict(
              dim=64, n_heads=4,
              q_lora_rank=0,
              kv_lora_rank=32,
              qk_nope_head_dim=16,
              qk_rope_head_dim=8,
              v_head_dim=16,
              max_seq_len=64,
              rope_theta=10000,
              rope_factor=1.0,
              mscale=1.0,
          )
          mla = MultiHeadLatentAttention(cfg)
          x = torch.randn(2, 16, 64)
          out = mla(x)
          assert out.shape == x.shape, f"MLA output shape {out.shape} != {x.shape}"
          print("MLA smoke test passed.")
          EOF

      - name: Smoke test — config load
        run: |
          python - <<'EOF'
          import yaml, os
          with open("configs/pretrain_config.yaml") as f:
              cfg = yaml.safe_load(f)
          assert cfg["model"]["dim"] == 2048
          assert cfg["model"]["n_layers"] == 27
          assert cfg["model"]["n_routed_experts"] == 64
          print(f"Config loaded — dim={cfg['model']['dim']}, layers={cfg['model']['n_layers']}")
          print("Config smoke test passed.")
          EOF
